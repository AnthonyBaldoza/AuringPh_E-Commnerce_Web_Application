<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Code - AuringPh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>

<div class="auth-page">

  <!-- LEFT SIDE: Branding / Image -->
  <div class="auth-branding">
    <div class="auth-branding-overlay"></div>
    <img src="images/auth-banner.jpg" alt="AuringPh Collection" class="auth-branding-img">
    <div class="auth-branding-content">
      <div class="brand-logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
          <polygon points="50,6 94,88 6,88" stroke="#ffffff" stroke-width="2" fill="none"/>
          <polygon points="50,13 87,85 13,85" stroke="#ffffff" stroke-width="1" fill="none"/>
          <text x="50" y="40" text-anchor="middle" font-size="10" fill="#ffffff" font-family="Georgia,serif" letter-spacing="3">AURING</text>
          <line x1="24" y1="48" x2="76" y2="48" stroke="#ffffff" stroke-width="0.8"/>
          <ellipse cx="50" cy="64" rx="10" ry="13" stroke="#ffffff" stroke-width="1.2" fill="none"/>
        </svg>
        <span class="brand-name">AuringPh</span>
      </div>
      <h1>Almost there!</h1>
      <p>Enter the 6-digit code we sent you to verify it's really you before resetting your password.</p>
    </div>
  </div>

  <!-- RIGHT SIDE: OTP Form -->
  <div class="auth-form-section" id="main">
    <div class="auth-form-wrap">

      <a href="forgot-password.html" class="auth-back-link">← Back</a>

      <div class="icon-circle" style="background:#d4e8f0;">✉️</div>

      <div class="auth-header center">
        <h2>Check your Email</h2>
        <p style="margin-bottom:4px;">We sent a 6-digit code to</p>
        <p style="font-weight:700; color:var(--text-dark);">bal***@email.com</p>
      </div>

      <form id="otp-form">
        <div class="otp-row">
          <input class="otp-box" maxlength="1" inputmode="numeric" value="3">
          <input class="otp-box" maxlength="1" inputmode="numeric" value="8">
          <input class="otp-box" maxlength="1" inputmode="numeric" value="4">
          <input class="otp-box" maxlength="1" inputmode="numeric">
          <input class="otp-box" maxlength="1" inputmode="numeric">
          <input class="otp-box" maxlength="1" inputmode="numeric">
        </div>

        <button type="submit" class="btn-primary">Verify Code</button>
      </form>

      <div class="link-row" style="margin-top:14px;">
        Didn't receive the code? <a onclick="showToast('Verification code resent!')">Resend (0:45)</a>
      </div>
      <div class="link-row">
        Wrong email? <a href="forgot-password.html">Change Email</a>
      </div>

    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="js/script.js"></script>
<script>
// ── OTP auto-focus: jump to next box, go back on backspace ──
const otpBoxes = document.querySelectorAll('.otp-box');
otpBoxes.forEach((box, i) => {
  box.addEventListener('input', () => {
    box.value = box.value.replace(/[^0-9]/g, ''); // digits only
    if (box.value && i < otpBoxes.length - 1) otpBoxes[i + 1].focus();
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && i > 0) otpBoxes[i - 1].focus();
  });
});

document.getElementById('otp-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const code = [...otpBoxes].map(b => b.value).join('');
  if (code.length < 6) {
    showToast('Please enter the full 6-digit code');
    return;
  }
  // For now, just go to the reset password page.
  // Later: this is where you'd verify the code with your backend.
  window.location.href = 'reset-password.html';
});
</script>
</body>
</html>
