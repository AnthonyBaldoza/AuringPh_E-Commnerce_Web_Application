<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - AuringPh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
<a href="#main" class="skip-link">Skip to main content</a>
    <div class="auth-page">
      <!-- LEFT SIDE: Branding / Image -->
      <div class="auth-branding">
        <div class="auth-branding-overlay"></div>
        <img
          src="images/auth-banner.jpg"
          alt="AuringPh Collection"
          class="auth-branding-img"
        />
        <div class="auth-branding-content">
          <div class="brand-logo">
            <svg
              viewBox="0 0 100 100"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              width="60"
              height="60"
            >
              <polygon
                points="50,6 94,88 6,88"
                stroke="#ffffff"
                stroke-width="2"
                fill="none"
              />
              <polygon
                points="50,13 87,85 13,85"
                stroke="#ffffff"
                stroke-width="1"
                fill="none"
              />
              <text
                x="50"
                y="40"
                text-anchor="middle"
                font-size="10"
                fill="#ffffff"
                font-family="Georgia,serif"
                letter-spacing="3"
              >
                AURING
              </text>
              <line
                x1="24"
                y1="48"
                x2="76"
                y2="48"
                stroke="#ffffff"
                stroke-width="0.8"
              />
              <ellipse
                cx="50"
                cy="64"
                rx="10"
                ry="13"
                stroke="#ffffff"
                stroke-width="1.2"
                fill="none"
              />
            </svg>
            <span class="brand-name">AuringPh</span>
          </div>
          <h1>Account recovery, made easy</h1>
          <p>
            We'll send a verification code to your email so you can get back
            into your account safely.
          </p>
        </div>
      </div>

      <!-- RIGHT SIDE: Forgot Password Form -->
      <div class="auth-form-section" id="main">
        <div class="auth-form-wrap">
          <a href="index.html" class="auth-back-link">← Back to Login</a>

          <div class="icon-circle" style="background: #fde8d8">🔒</div>

          <div class="auth-header center">
            <h2>Forgot Password?</h2>
            <p>
              No worries! Enter your email and we'll send you a verification
              code.
            </p>
          </div>

          <form id="forgot-form">
            <label class="field-label" for="forgot-email">Email Address</label>
            <input
              class="field-input"
              type="email"
              id="forgot-email"
              placeholder="your@email.com"
              required
            />

            <button type="submit" class="btn-primary">Send Reset Code</button>
          </form>

          <div class="link-row">
            Remembered it? <a href="index.html">Back to Log in</a>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/script.js"></script>
    <script>
      document
        .getElementById("forgot-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          // For now, just go to the OTP verification page.
          // Later: this is where you'd call your backend to actually send the code.
          window.location.href = "otp.html";
        });
    </script>
  </body>
</html>
