<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Messages – AuringPh</title>
    <link rel="icon" href="../images/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <link rel="stylesheet" href="../css/messaging.css" />
  </head>
  <body class="admin-body">

    <div class="admin-sidebar-backdrop" id="sidebarBackdrop"></div>

    <div class="admin-layout">

      <!-- ============ SIDEBAR ============ -->
      <aside class="admin-sidebar" id="adminSidebar">
        <div class="admin-sidebar-brand">
          <img src="../images/logo.png" alt="AuringPh Logo" onerror="this.style.display='none'">
          <div class="brand-text">AuringPh<small>Admin Panel</small></div>
        </div>

        <nav class="admin-nav">
          <a href="dashboard.html" class="admin-nav-link"><span class="nav-ico">📊</span> Dashboard</a>
          <a href="products.html" class="admin-nav-link"><span class="nav-ico">👕</span> Manage Products</a>
          <a href="admin-orders.html" class="admin-nav-link"><span class="nav-ico">📦</span> Manage Orders</a>
          <a href="users.html" class="admin-nav-link"><span class="nav-ico">👥</span> Manage Users</a>
          <a href="admin-messages.html" class="admin-nav-link active"><span class="nav-ico">💬</span> Messages</a>
        </nav>

        <div class="admin-sidebar-footer">
          <button class="admin-logout-btn" data-admin-logout>🚪 Logout</button>
        </div>
      </aside>

      <!-- ============ MAIN CONTENT ============ -->
      <main class="admin-main">

        <div class="admin-topbar">
          <div style="display:flex; align-items:center; gap:14px;">
            <button class="admin-mobile-toggle" id="sidebarToggle">☰</button>
            <div>
              <h1>Messages</h1>
              <div class="admin-sub" id="adminUnreadBadge"></div>
            </div>
          </div>
          <div class="admin-whoami">
            <div class="avatar-circle" id="adminWhoamiAvatar">A</div>
            <span id="adminWhoamiName">Admin</span>
          </div>
        </div>

        <!-- Chat layout: sidebar of users + main thread -->
        <div class="chat-page-layout">
          <!-- LEFT: User list -->
          <div class="chat-sidebar">
            <div class="chat-sidebar-header">
              <div class="chat-sidebar-title">Conversations</div>
              <input class="chat-search" placeholder="Search customers..." oninput="filterConvs(this.value)" />
            </div>
            <div class="chat-conversations" id="convList">
              <!-- Rendered by JS -->
            </div>
          </div>

          <!-- RIGHT: Active thread -->
          <div class="chat-main" id="chatMainArea">
            <!-- Empty state -->
            <div class="chat-empty-state" id="emptyState">
              <div class="chat-empty-icon">💬</div>
              <div class="chat-empty-title">Select a conversation</div>
              <div class="chat-empty-sub">Choose a customer from the list to start replying.</div>
            </div>

            <!-- Active chat (hidden until conv selected) -->
            <div id="activeChatArea" style="display:none;flex-direction:column;height:100%;">
              <div class="chat-header">
                <div class="chat-header-avatar" id="activeUserAvatar">U</div>
                <div class="chat-header-info">
                  <div class="chat-header-name" id="activeUserName">Customer</div>
                  <div class="chat-header-sub" id="activeUserSub">User</div>
                </div>
                <div class="chat-header-actions">
                  <button class="chat-icon-btn" onclick="openSendInvoice()">📄 Send Invoice</button>
                </div>
              </div>

              <div class="chat-messages" id="adminChatMessages"></div>

              <div class="chat-input-area">
                <div class="chat-input-wrap">
                  <div class="chat-quick-actions">
                    <button class="quick-action-btn" onclick="insertAdminQuick('Thank you for reaching out! How can I help you today? 😊')">Greeting</button>
                    <button class="quick-action-btn" onclick="insertAdminQuick('I&#39;ll check on that right away and get back to you shortly.')">Will check</button>
                    <button class="quick-action-btn" onclick="insertAdminQuick('Your invoice has been processed and sent. Please check your email. ✅')">Invoice sent</button>
                    <button class="quick-action-btn" onclick="insertAdminQuick('Is there anything else I can help you with?')">Anything else?</button>
                  </div>
                  <div class="chat-input-row">
                    <textarea
                      class="chat-textarea"
                      id="adminMessageInput"
                      placeholder="Reply to customer..."
                      rows="1"
                      onkeydown="handleAdminKey(event)"
                      oninput="autoResize(this)"
                    ></textarea>
                    <button class="chat-send-btn" onclick="sendAdminMessage()">➤</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>

    <!-- Send Invoice Modal -->
    <div class="invoice-modal-overlay" id="sendInvoiceModal">
      <div class="invoice-modal">
        <div class="invoice-modal-title">📄 Send Invoice to Customer</div>
        <div class="form-group">
          <label>Invoice ID</label>
          <input type="text" id="siId" placeholder="e.g. #INV-20241015" />
        </div>
        <div class="form-group">
          <label>Order ID</label>
          <input type="text" id="siOrder" placeholder="e.g. #ORD-20241015" />
        </div>
        <div class="form-group">
          <label>Item Description</label>
          <input type="text" id="siItem" placeholder="e.g. Nike Air Force 1 '07 White (EU 42)" />
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="text" id="siAmount" placeholder="e.g. ₱4,995" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="text" id="siDate" placeholder="e.g. Oct 15, 2024" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="siStatus">
            <option value="Paid">Paid</option>
            <option value="Pending">Pending</option>
            <option value="Refunded">Refunded</option>
          </select>
        </div>
        <div class="invoice-modal-actions">
          <button class="btn-outline" onclick="closeSendInvoice()">Cancel</button>
          <button class="btn-primary" onclick="submitSendInvoice()">Send Invoice</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../js/script.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/messaging.js"></script>
    <script>
      const ADMIN_ROLE = 'admin';
      let activeUserId = null;
      let allChatsCache = {};

      // ── Demo users (in real app, pulled from user DB) ──
      const demoUsers = [
        { id: 'user_ac', name: 'Anna Cramling',  email: 'cramling@gmail.com'     },
        { id: 'user_jd', name: 'Juan dela Cruz',  email: 'jdc@email.com'          },
        { id: 'user_ms', name: 'Maria Santos',    email: 'msantos@email.com'      },
      ];

      // Add the actual currently-registered/logged-in user (from auth.js),
      // so the admin sees the real sender name instead of only demo names.
      // This reads the same "user" key that messages.html uses to build
      // its USER_ID, keeping both pages in sync.
      const storedRealUser = JSON.parse(localStorage.getItem('user')) || null;
      if (storedRealUser && storedRealUser.email) {
        const realName = `${storedRealUser.firstName || ''} ${storedRealUser.lastName || ''}`.trim() || 'Guest User';
        const realId = 'user_' + storedRealUser.email.toLowerCase().replace(/[^a-z0-9]/g, '_');
        // Avoid duplicating if it happens to match a demo id
        if (!demoUsers.some(u => u.id === realId)) {
          demoUsers.unshift({ id: realId, name: realName, email: storedRealUser.email });
        }
      }

      // Seed demo data for all demo users
      seedDemoIfEmpty('user_ac', 'Anna Cramling');
      // Seed quick threads for other users
      function seedOtherUsers() {
        const all = getAllChats();
        if (!all['user_jd'] || all['user_jd'].messages.length === 0) {
          const now = Date.now();
          postMessage('user_jd', 'user', 'Magandang araw! May concern ako sa aking order.');
          postMessage('user_jd', 'admin', 'Magandang araw din! Paano kita matutulungan? 😊');
          postMessage('user_jd', 'user', 'Puwede ba akong humingi ng invoice para sa order ko na #ORD-20241005?');
        }
        if (!all['user_ms'] || all['user_ms'].messages.length === 0) {
          postMessage('user_ms', 'user', 'Hi! I need to know the status of my payment.');
          postMessage('user_ms', 'admin', 'Hi Maria! Let me check that for you.');
        }
      }
      seedOtherUsers();

      // ── Render conversation list ──
      function renderConvList(filter = '') {
        const all = getAllChats();
        const container = document.getElementById('convList');
        let html = '';

        demoUsers.forEach(u => {
          const thread = all[u.id];
          const msgs = thread ? thread.messages : [];
          const last = msgs[msgs.length - 1];
          const preview = last
            ? (last.type === 'invoice' ? '📄 Invoice sent' : last.text.slice(0, 40) + (last.text.length > 40 ? '…' : ''))
            : 'No messages yet';
          const time = last ? formatTime(last.time) : '';
          const unread = getUserUnread(u.id);
          const initials = getInitials(u.name);
          const isActive = u.id === activeUserId ? 'active' : '';
          const lf = filter.toLowerCase();
          if (filter && !u.name.toLowerCase().includes(lf) && !u.email.toLowerCase().includes(lf)) return;

          html += `
            <div class="chat-conv-item ${isActive}" onclick="openConversation('${u.id}', '${u.name}', '${u.email}')">
              <div class="conv-avatar">${initials}<span class="online-dot"></span></div>
              <div class="conv-info">
                <div class="conv-name">${u.name}</div>
                <div class="conv-preview">${escapeHtml(preview)}</div>
              </div>
              <div class="conv-meta">
                <div class="conv-time">${time}</div>
                ${unread > 0 ? `<div class="conv-unread">${unread}</div>` : ''}
              </div>
            </div>`;
        });

        container.innerHTML = html || '<div style="padding:16px;color:var(--text-light);font-size:13px;">No conversations found.</div>';

        // Update admin unread badge
        const total = demoUsers.reduce((s, u) => s + getUserUnread(u.id), 0);
        const badge = document.getElementById('adminUnreadBadge');
        badge.textContent = total > 0 ? `${total} unread message${total > 1 ? 's' : ''}` : '';
      }

      function filterConvs(val) { renderConvList(val); }

      // ── Open a conversation ──
      function openConversation(userId, name, email) {
        activeUserId = userId;
        markRead(userId, 'admin');

        document.getElementById('emptyState').style.display = 'none';
        const area = document.getElementById('activeChatArea');
        area.style.display = 'flex';

        document.getElementById('activeUserAvatar').textContent = getInitials(name);
        document.getElementById('activeUserName').textContent = name;
        document.getElementById('activeUserSub').textContent = email;

        const thread = getThread(userId);
        renderThread(thread.messages, ADMIN_ROLE, document.getElementById('adminChatMessages'));
        renderConvList();
      }

      // ── Send admin message ──
      function sendAdminMessage() {
        if (!activeUserId) return;
        const input = document.getElementById('adminMessageInput');
        const text = input.value.trim();
        if (!text) return;
        postMessage(activeUserId, 'admin', text);
        input.value = '';
        autoResize(input);
        renderThread(getThread(activeUserId).messages, ADMIN_ROLE, document.getElementById('adminChatMessages'));
        renderConvList();
      }

      function handleAdminKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendAdminMessage();
        }
      }

      function insertAdminQuick(text) {
        const input = document.getElementById('adminMessageInput');
        input.value = text;
        input.focus();
        autoResize(input);
      }

      // ── Send Invoice modal ──
      function openSendInvoice() {
        document.getElementById('sendInvoiceModal').classList.add('open');
      }

      function closeSendInvoice() {
        document.getElementById('sendInvoiceModal').classList.remove('open');
      }

      function submitSendInvoice() {
        if (!activeUserId) return;
        const inv = {
          id:     document.getElementById('siId').value.trim()     || '#INV-' + Date.now(),
          order:  document.getElementById('siOrder').value.trim()  || 'N/A',
          item:   document.getElementById('siItem').value.trim()   || 'Item',
          amount: document.getElementById('siAmount').value.trim() || '₱0',
          date:   document.getElementById('siDate').value.trim()   || new Date().toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' }),
          status: document.getElementById('siStatus').value        || 'Paid'
        };
        postMessage(activeUserId, 'admin', '', { type: 'invoice', invoice: inv });
        closeSendInvoice();
        renderThread(getThread(activeUserId).messages, ADMIN_ROLE, document.getElementById('adminChatMessages'));
        renderConvList();
        showToast('Invoice sent to customer! 📄');
        // Clear fields
        ['siId','siOrder','siItem','siAmount','siDate'].forEach(id => document.getElementById(id).value = '');
      }

      function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      }

      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
      }

      // ── Polling to refresh list and active thread ──
      setInterval(() => {
        renderConvList();
        if (activeUserId) {
          const thread = getThread(activeUserId);
          const container = document.getElementById('adminChatMessages');
          const prev = container.querySelectorAll('.msg-row').length;
          if (thread.messages.length !== prev) {
            renderThread(thread.messages, ADMIN_ROLE, container);
          }
        }
      }, 2000);

      // Initial render
      renderConvList();
    </script>
  </body>
</html>
