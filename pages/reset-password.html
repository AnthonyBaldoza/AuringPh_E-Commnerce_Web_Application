<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - AuringPh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>

<div class="auth-page">

  <!-- LEFT SIDE: Branding / Image -->
  <div class="auth-branding">
    <div class="auth-branding-overlay"></div>
    <img src="images/auth-banner.jpg" alt="AuringPh Collection" class="auth-branding-img">
    <div class="auth-branding-content">
      <div class="brand-logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
          <polygon points="50,6 94,88 6,88" stroke="#ffffff" stroke-width="2" fill="none"/>
          <polygon points="50,13 87,85 13,85" stroke="#ffffff" stroke-width="1" fill="none"/>
          <text x="50" y="40" text-anchor="middle" font-size="10" fill="#ffffff" font-family="Georgia,serif" letter-spacing="3">AURING</text>
          <line x1="24" y1="48" x2="76" y2="48" stroke="#ffffff" stroke-width="0.8"/>
          <ellipse cx="50" cy="64" rx="10" ry="13" stroke="#ffffff" stroke-width="1.2" fill="none"/>
        </svg>
        <span class="brand-name">AuringPh</span>
      </div>
      <h1>One last step</h1>
      <p>Choose a strong new password to keep your AuringPh account safe and secure.</p>
    </div>
  </div>

  <!-- RIGHT SIDE: Reset Password Form -->
  <div class="auth-form-section" id="main">
    <div class="auth-form-wrap">

      <a href="otp.html" class="auth-back-link">← Back</a>

      <div class="icon-circle" style="background:#d4e8f0;">🔑</div>

      <div class="auth-header center">
        <h2>Set New Password</h2>
        <p>Your new password must be different from your previous password.</p>
      </div>

      <form id="reset-form">
        <label class="field-label" for="new-pass">New Password</label>
        <input class="field-input" type="password" id="new-pass" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" required>

        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strength-label"></div>

        <div class="hint-row" id="hint-length"><span>○</span> At least 8 characters</div>
        <div class="hint-row" id="hint-number"><span>○</span> Contains a number</div>
        <div class="hint-row" id="hint-special" style="margin-bottom:14px;"><span>○</span> Contains a special character</div>

        <label class="field-label" for="confirm-pass">Confirm New Password</label>
        <input class="field-input" type="password" id="confirm-pass" placeholder="Re-enter password" required>

        <button type="submit" class="btn-primary">Reset Password</button>
      </form>

    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="js/script.js"></script>
<script>
// ── Live password strength checker ──
function checkStrength(val) {
  const segs = ['s1', 's2', 's3', 's4'];
  const label = document.getElementById('strength-label');

  segs.forEach(id => document.getElementById(id).className = 'strength-seg');

  const hasLength = val.length >= 8;
  const hasNumber = /[0-9]/.test(val);
  const hasSpecial = /[^A-Za-z0-9]/.test(val);

  // Update hint rows
  setHint('hint-length', hasLength);
  setHint('hint-number', hasNumber);
  setHint('hint-special', hasSpecial);

  if (val.length === 0) {
    label.textContent = '';
    return;
  }

  const score = [hasLength, hasNumber, hasSpecial].filter(Boolean).length;

  if (val.length < 8) {
    document.getElementById('s1').classList.add('weak');
    label.textContent = 'Weak password';
    label.style.color = 'var(--red)';
  } else if (score < 3) {
    ['s1', 's2'].forEach(id => document.getElementById(id).classList.add('medium'));
    label.textContent = 'Medium password';
    label.style.color = '#f0a030';
  } else {
    segs.forEach(id => document.getElementById(id).classList.add('strong'));
    label.textContent = 'Strong password!';
    label.style.color = 'var(--green)';
  }
}

function setHint(id, ok) {
  const row = document.getElementById(id);
  const icon = row.querySelector('span');
  if (ok) {
    icon.textContent = '✓';
    row.classList.add('hint-ok');
    row.classList.remove('hint-fail');
  } else {
    icon.textContent = '○';
    row.classList.remove('hint-ok');
    row.classList.add('hint-fail');
  }
}

document.getElementById('reset-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const pass = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;

  if (pass !== confirm) {
    showToast("Passwords don't match!");
    return;
  }
  if (pass.length < 8) {
    showToast('Password must be at least 8 characters');
    return;
  }

  // For now, just go back to login.
  // Later: this is where you'd save the new password via your backend.
  window.location.href = 'index.html';
});
</script>

</body>
</html>
